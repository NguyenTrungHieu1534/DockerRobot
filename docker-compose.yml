services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_SOURCE_URL=jdbc:mysql://db:3306/demo_docker_db?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATA_SOURCE_USERNAME=root
      - SPRING_DATA_SOURCE_PASSWORD=root
    depends_on:
      - db-mysql
  
db-mysql:
    image: mysql:latest
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=demo_docker_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: