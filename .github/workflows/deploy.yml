name: Docker Build and Push

on:
  push:
    branches: [ "master" ] # Tự động chạy khi có code mới đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Tự động đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2 & 3. Tự động Build và Push Image (kèm Tags)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                # Chạy Dockerfile ở thư mục gốc
          push: true                # Tự động push sau khi build xong
          tags: |                   # Đặt tags cho image
            ${{ secrets.DOCKER_USERNAME }}/ngtrunghieu1534:latest
            ${{ secrets.DOCKER_USERNAME }}/ngtrunghieu1534:${{ github.sha }}
            
      - name: Triển khai lên DevOps Classroom
        run: |
          # Đây là giá trị lấy từ Docker Hub của bạn trong ảnh
          REPO="ngtrunghieu1534/ngtrunghieu1534"
          
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest" \
            -o "$RESPONSE_FILE" \
            -w "%{http_code}")

          echo "Webhook HTTP Status: $HTTP_CODE"
          BODY=$(cat "$RESPONSE_FILE")

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "::error::Deploy thất bại với mã lỗi $HTTP_CODE"
            echo "::group::Chi tiết lỗi từ Webhook"
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            echo "::endgroup::"
            exit 1
          fi

          echo "Deploy thành công."
          echo "::group::Chi tiết phản hồi JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

