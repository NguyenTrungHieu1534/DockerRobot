name: Docker Build and Push

on:
  push:
    branches: [ "master" ] # Tự động chạy khi có code mới đẩy lên nhánh main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Tự động đăng nhập vào Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 2 & 3. Tự động Build và Push Image (kèm Tags)
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                # Chạy Dockerfile ở thư mục gốc
          push: true                # Tự động push sau khi build xong
          tags: |                   # Đặt tags cho image
            ${{ secrets.DOCKER_USERNAME }}/my-project:latest
            ${{ secrets.DOCKER_USERNAME }}/my-project:${{ github.sha }}
